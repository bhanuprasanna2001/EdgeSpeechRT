extends: gtcrn_base.yaml
hidden_size: 32
model:
  name: streaming_gtcrn_style_masker_pruned
  causal: true
  input: log1p_magnitude
  recurrent_state: gru_hidden
compression:
  structured_pruning:
    method: hidden_size_reduction
    baseline_hidden_size: 48
    target_hidden_size: 32
    fine_tune_epochs: 3
